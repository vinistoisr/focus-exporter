name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./internal/db/ ./internal/mcp/ -v -count=1

      - name: Build
        run: go build -ldflags "-H=windowsgui" -o timewarp.exe .

      - name: Vet
        run: go vet ./...
